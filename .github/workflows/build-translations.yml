name: Build translations
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      TX_TOKEN:
        required: false

jobs:
  build-translations:

    runs-on: ubuntu-22.04
    # Leave enough time for a full pull followed by targeted retries. This is
    # a safety cap only; the higher worker count keeps normal runs much shorter.
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
    env:
      TX_TOKEN: ${{ secrets.TX_TOKEN }}
    steps:
      - name: Install gettext
        if: ${{ env.TX_TOKEN != '' }}
        run: sudo apt-get install gettext

      - name: Install Transifex CLI
        if: ${{ env.TX_TOKEN != '' }}
        run: |
          curl -sL https://github.com/transifex/cli/releases/download/v1.6.17/tx-linux-amd64.tar.gz | sudo tar zxvf - -C /usr/bin tx

      - name: Checkout local repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: master
          sparse-checkout: |
            .tx
            tools
            lang
          fetch-depth: 1
          persist-credentials: false

      - name: Pull translations
        if: ${{ env.TX_TOKEN != '' }}
        shell: bash
        run: |
          log="$RUNNER_TEMP/tx-pull.log"
          attempted="$RUNNER_TEMP/tx-attempted-languages"
          completed="$RUNNER_TEMP/tx-completed-languages"
          failed="$RUNNER_TEMP/tx-failed-languages"

          # The Transifex HTTP/2 connection may be closed after roughly one
          # hour. Use the CLI's default concurrency to finish sooner, let it
          # continue past individual failures, then retry only the languages
          # that started but did not finish using a fresh connection.
          pull_status=0
          tx pull -a --force --skip -w 5 2>&1 | tee "$log" || pull_status=$?

          sed -nE 's/.*\[([^][]+)\] - .*/\1/p' "$log" |
            sort -u > "$attempted"
          sed -nE 's/.*\[([^][]+)\] - Done[[:space:]]*$/\1/p' "$log" |
            sort -u > "$completed"
          comm -23 "$attempted" "$completed" > "$failed"

          if [ ! -s "$failed" ]; then
            exit "$pull_status"
          fi

          retry_failed=0
          while IFS= read -r language; do
            recovered=false
            for attempt in 1 2 3; do
              echo "::warning::Retrying Transifex language $language (attempt $attempt/3)"
              if timeout 5m tx pull -l "$language" --force -w 1; then
                recovered=true
                break
              fi
              sleep $((attempt * 10))
            done
            if [ "$recovered" != true ]; then
              echo "::error::Failed to pull Transifex language $language after 3 retries"
              retry_failed=1
            fi
          done < "$failed"
          exit "$retry_failed"

      - name: Reuse translations from latest successful master build
        if: ${{ env.TX_TOKEN == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow matrix.yml \
            --branch master --event push --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId')"
          if [ -z "$run_id" ]; then
            echo "::error::No successful master translation artifact is available"
            exit 1
          fi
          echo "::notice::TX_TOKEN unavailable; using translations from trusted master run $run_id"
          artifact_dir="$RUNNER_TEMP/master-translations"
          gh run download "$run_id" --repo "$GITHUB_REPOSITORY" \
            --name translations --dir "$artifact_dir"
          cp -a "$artifact_dir/." .

      - name: Validate and discard invalid translations
        if: ${{ env.TX_TOKEN != '' }}
        run: ./lang/discard_invalid_po.sh

      - name: Update translation statistics
        if: ${{ env.TX_TOKEN != '' }}
        run: ./lang/update_stats.sh

      - name: Compile translations
        if: ${{ env.TX_TOKEN != '' }}
        run: ./lang/compile_mo.sh all

      - name: Store translation artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "translations"
          path: |
            lang/po
            lang/mo
            src/lang_stats.inc
          if-no-files-found: error
